name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        env:
          # We need this because in the GitHub VM there is no .env, and we
          # would get an error for the missing DATABASE_URL so we just use this dummy
          DATABASE_URL: postgresql://DUMMY_URL
        run: bunx prisma generate --schema prisma/schema.prisma

      - name: Run ESLint
        run: bun run eslint

      - name: Run Prettier check
        run: bunx --bun prettier --check .
